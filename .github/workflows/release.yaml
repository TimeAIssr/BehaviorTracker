name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Extract version from tag
        id: version
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          VERSION=${TAG_NAME#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION from tag: $TAG_NAME"

      - name: Update version in build.gradle
        run: |
          VERSION=${{ steps.version.outputs.version }}
          # Update versionName
          sed -i "s/versionName = \".*\"/versionName = \"$VERSION\"/" app/build.gradle
          # Increment versionCode
          CURRENT_CODE=$(grep -oP 'versionCode = \K\d+' app/build.gradle)
          NEW_CODE=$((CURRENT_CODE + 1))
          sed -i "s/versionCode = $CURRENT_CODE/versionCode = $NEW_CODE/" app/build.gradle
          echo "Updated versionName to $VERSION, versionCode to $NEW_CODE"

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew --no-daemon assembleDebug

      - name: Rename APK
        run: |
          VERSION=${{ steps.version.outputs.version }}
          mv app/build/outputs/apk/debug/app-debug.apk \
             app/build/outputs/apk/debug/BehaviorTracker-v${VERSION}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          body: |
            ## Behavior Tracker ${{ steps.version.outputs.tag }}
            
            ### Changes
            See [commit history](https://github.com/${{ github.repository }}/commits/${{ steps.version.outputs.tag }}) for details.
            
            ### Installation
            Download the APK file below and install on your Android device.
          files: app/build/outputs/apk/debug/*.apk
          draft: false
          prerelease: false
